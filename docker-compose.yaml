services:
  db:
    image: timescale/timescaledb:latest-pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: iots
      POSTGRES_USER: iots
      POSTGRES_PASSWORD: iots
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iots -d iots"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  rest:
    build:
      context: .
      dockerfile: backend/dockerfile.rest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://iots:iots@db:5432/iots
      SECRET_KEY: c8cb051bc8f4eed64b83c434e3932f25d5e1ee3871c1a9bc876c96b6ce94d46d
      JWT_SECRET_KEY: c8cb051bc8f4eed64b83c434e3932f25d5e1ee3871c1a9bc876c96b6ce94d46d
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
 
volumes:
  pgdata: